<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="store.css">
    <title>Tiger Store</title>

<body>
    <div id="login">
        <h1 id="login-title">Tiger Store Login</h1>
        <div id="google-signin">
            <img id="login-google" src="/signin-with-google.png" width="573" height="127"></img>
        </div>
        <div id="school-info">
            <span class="br"></span> 
            <br>
            <label for="grade">What is your grade level?</label>
            <br>
            <select name="grade" id="grade">
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                </select>
            <br>
            
            <label for="halftime">Who is your halftime facilitator?</label>
            <br>
            <select name="halftime" id="halftime">
                <option value="Ms. Kemme">Ms. Kemme</option>
                <option value="Mr. Leppers">Mr. Leppers</option>
                <option value="Miss Sylvester">Miss Sylvester</option>
                <option value="Miss Sutter">Miss Sutter</option>
                <option value="Mrs. Gorman">Mrs. Gorman</option>
                <option value="Mr. Polley">Mr. Polley</option>
                <option value="Mrs. Wallet and Mr. Brown">Mrs. Wallet and Mr. Brown</option>
                <option value="Mr. Garcia">Mr. Garcia</option>
                <option value="Ms. Henry">Ms. Henry</option>
                <option value="Mrs. Horsley">Mrs. Horsley</option>
                <option value="Mrs. Repp">Mrs. Repp</option>
                <option value="Mrs. Doherty">Mrs. Doherty</option>
                <option value="Mrs. Gerding">Mrs. Gerding</option>
                <option value="Miss Mathias">Miss Mathias</option>
                </select>
            <br style=
            "line-height:40px">
        </div>
        <button id="enter-store">Enter Store</button>
        <br>
    </div>

        <br>
        <button id="review-order">Review Order</button>

    <div id="cart">
        <h1>Shopping Cart</h1>
        <table id="shop-cart">
            <tr>
                <th>Item Name</th>
                <th>Item Cost (Tiger Bucks)</th>
            </tr>
        </table>
        <br>
        <button id="submit-order">Submit Order</button>
    
    </div>
    <script src="store.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
